name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./student

    steps:
      - name: 1. Checkout du code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './student/package-lock.json'

      - name: 3. Installation des dépendances
        run: npm ci

      - name: 4. Vérification du code (lint)
        run: npm run lint

      - name: 5. Tests E2E (Tes 20 tests)
        run: npm run test:e2e

      - name: 6. Rapport de couverture
        run: npm run test:cov

      - name: 7. Build du projet (Indispensable !)
        run: npm run build

      - name: 8. Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: student/coverage/